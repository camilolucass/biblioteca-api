services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteca_postgres
    environment:
      POSTGRES_DB: biblioteca_db
      POSTGRES_USER: biblioteca_user
      POSTGRES_PASSWORD: biblioteca_pass
    ports:
      - "5432:5432"
    volumes:
      - biblioteca_postgres_data:/var/lib/postgresql/data

volumes:
  biblioteca_postgres_data:
